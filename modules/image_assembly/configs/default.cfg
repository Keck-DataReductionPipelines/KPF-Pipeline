[LOGGER]
log = True
log_path = logs/image_assembly.log
log_level = info
log_verbose = True

[PARAM]
channel_orientation_ref_path_red = /code/KPF-Pipeline/static/kpfsim_ccd_orient_red.txt
channel_orientation_ref_path_green = /code/KPF-Pipeline/static/kpfsim_ccd_orient_green.txt
# assumes 4 amps per detector here; special logic in image_assembly module handles 2 amps per detector.
# GJG: seems unnecessary to put these static values in the config file
channel_datasec_ncols_green = 2040
channel_datasec_nrows_green = 2040
channel_datasec_ncols_red = 2040
channel_datasec_nrows_red = 2040
# columns bracketing prescan region
prescan_region = [0,4]
overscan_method = rowmedian
# number of columns at start and end of each row in post-overscan strip to ignore.
overscan_clip = 5
overscan_sigma = 2.1