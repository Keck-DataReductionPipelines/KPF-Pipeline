description: Ages of Master Files
plot_type: time_series_multipanel
panel_arr:
  - panelvars:
      - col: AGEBIAS
        plot_type: scatter
        plot_attr:
          label: Age of Master Bias File (days)
          marker: .
    paneldict:
      ylabel: "Master Bias Age\nFile (days, AGEBIAS)"
      not_junk: true
      qc_not_fail: 'DATAPRL0, KWRDPRL0, TIMCHKL0'
      legend_frac_size: 0.15

  - panelvars:
      - col: AGEDARK
        plot_type: scatter
        plot_attr:
          label: Age of Master Dark File (days)
          marker: .
    paneldict:
