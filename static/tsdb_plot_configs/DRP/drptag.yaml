description: KPF-Pipeline Version Number
plot_type: time_series_multipanel
panel_arr:
  - panelvars:
      - col: DRPTAG2D
        plot_type: state
        plot_attr:
          label: DRP Version - 2D
          marker: .
    paneldict:
          label: "DRP Version - 2D\n(DRPTAG2D)"
      not_junk: true
      legend_frac_size: 0.15

  - panelvars:
      - col: DRPTAGL1
        plot_type: state
        plot_attr:
          label: "DRP Version - L1\n(DRPTAGL1)"
          marker: .
    paneldict:
      ylabel: DRP Version - L1
      not_junk: true
      legend_frac_size: 0.15

  - panelvars:
      - col: DRPTAGL2
        plot_type: state
        plot_attr:
          label: "DRP Version - L2\n(DRPTAGL2)"
          marker: .
    paneldict:
      ylabel: DRP Version - L2
      not_junk: true
      legend_frac_size: 0.15

  - panelvars:
      - col: DRFTCOR
        plot_type: state
        plot_attr:
          label: "Drift Correction\nApplied (DRFTCOR)"
          marker: .
    paneldict:
      ylabel: Drift Correction Applied
      not_junk: true
      qc_not_fail: 'GOODREAD, FLXSTATS, DATAPRL0, KWRDPRL0, TIMCHKL0'
      legend_frac_size: 0.15

  - panelvars:
      - col: KPFERA
        plot_type: state
        plot_attr:
          label: KPF ERA
          marker: .
    paneldict:
      ylabel: KPF ERA
      title: KPF-Pipeline Version Number
      legend_frac_size: 0.15
