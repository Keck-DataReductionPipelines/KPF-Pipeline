description: CCD Pressures
plot_type: time_series_multipanel
panel_arr:
  - panelvars:
      - col: kpfgreen.ECH_PRESS
        col_multiply: 1.333
        plot_type: scatter
        plot_attr:
          label: Green - Echelle side
          marker: .
          linewidth: 0.5
          color: darkgreen
      - col: kpfgreen.COL_PRESS
        col_multiply: 1.333
        plot_type: scatter
        plot_attr:
          label: Green - Collimator side
          marker: .
          linewidth: 0.5
          color: forestgreen
    paneldict:
      ylabel: "Green Ion Pump\nPressure (mbar)"
      yscale: 'log'
      ymin: 0.000000001
      ymax: 0.001
      qc_not_fail: 'TELEPRL0'
      legend_frac_size: 0.20
      axhspan:
        1:
          ymin: 0.0001
          ymax: 0.001
          color: red
          alpha: 0.1
        2:
          ymin: 0.000001
          ymax: 0.0001
          color: orange
          alpha: 0.1
        3:
          ymin: 0.000000001
          ymax: 0.000001
          color: green
          alpha: 0.1
  - panelvars:
      - col: kpfred.ECH_PRESS
        col_multiply: 1.333
        plot_type: scatter
        plot_attr:
          label: Red - Echelle side
          marker: .
          linewidth: 0.5
          color: indianred
      - col: kpfred.COL_PRESS
        col_multiply: 1.333
        plot_type: scatter
        plot_attr:
          label: Red - Collimator side
          marker: .
          linewidth: 0.5
          color: firebrick
    paneldict:
      ylabel: "Red Ion Pump\nPressure (mbar)"
      yscale: 'log'
      ymin: 0.000000001
      ymax: 0.001
      qc_not_fail: 'TELEPRL0'
      legend_frac_size: 0.20
      axhspan:
        1:
          ymin: 0.0001
          ymax: 0.001
          color: red
          alpha: 0.1
        2:
          ymin: 0.000001
          ymax: 0.0001
          color: orange
          alpha: 0.1
        3:
          ymin: 0.000000001
          ymax: 0.000001
          color: green
          alpha: 0.1
