description: KPF Agitator
plot_type: time_series_multipanel
panel_arr:
  - panelvars:
      - col: kpfmot.AGITSPD
        plot_type: scatter
        unit: counts/sec
        plot_attr:
          label: Agitator Speed
          marker: .
          linewidth: 0.5
    paneldict:
      ylabel: "Agitator Speed\n(counts/sec)\n(kpfmot.AGITSPD)"
      qc_not_fail: 'TELEPRL0'
      legend_frac_size: 0.25

  - panelvars:
      - col: kpfmot.AGITTOR
        plot_type: scatter
        unit: V
        plot_attr:
          label: Agitator Motor Torque
          marker: .
          linewidth: 0.5
    paneldict:
      ylabel: "Motor Torque (V)\n(kpfmot.AGITTOR)"
      qc_not_fail: 'TELEPRL0'
      legend_frac_size: 0.25

  - panelvars:
      - col: kpfmot.AGITMOT_T
        plot_type: scatter
        unit: K
        plot_attr:
          label: Motor Temp.
          marker: .
          linewidth: 0.5
    paneldict:
      ylabel: "Motor Temp. (C)\n(kpfmot.AGITMOT_T)"
      qc_not_fail: 'TELEPRL0'
      legend_frac_size: 0.25

  - panelvars:
      - col: kpfmot.AGITAMBI_T
        plot_type: scatter
        unit: K
        plot_attr:
          label: Ambient Temp.
          marker: .
          linewidth: 0.5
    paneldict:
      ylabel: "Ambient Temp. (C)\n(kpfmot.AGITAMBI_T)"
      qc_not_fail: 'TELEPRL0'
      legend_frac_size: 0.25

  - panelvars:
      - col: kpfpower.OUTLET_A1_Amps
        plot_type: scatter
        unit: mA
        plot_attr:
          label: Outlet A1 Power
          marker: .
          linewidth: 0.5
    paneldict:
      ylabel: "Agitator Power (mA)\n(kpfpower.OUTLET_A1_Amps)"
      title: KPF Agitator
      qc_not_fail: 'TELEPRL0'
      legend_frac_size: 0.25
