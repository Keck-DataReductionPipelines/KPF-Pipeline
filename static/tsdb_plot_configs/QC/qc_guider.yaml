description: QC - Guider Performance
plot_type: time_series_multipanel
panel_arr:
  - panelvars:
      - col: GUIDGOOD
        plot_type: state
        plot_attr:
          label: "Guider RMS and bias\nwithin 50 mas RMS"
          marker: .
    paneldict:
      ylabel: "Guider RMS and bias\nwithin 50 mas RMS\n(GUIDGOOD)"
      legend_frac_size: 0.15
      not_junk: true
      qc_not_fail: 'DATAPRL0, KWRDPRL0, TIMCHKL0'
  - panelvars:
      - col: GUIDSAT
        plot_type: state
        plot_attr:
          label: "Guider Not Saturated"
          marker: .
    paneldict:
      ylabel: "Guider Not Saturated\n(GUIDSAT)"
      title: QC - Guider Performance
      legend_frac_size: 0.15
      not_junk: true
      qc_not_fail: 'DATAPRL0, KWRDPRL0, TIMCHKL0'
