description: Last Good LFC and Etalon Calibrations
plot_type: time_series_multipanel
panel_arr:
  - panelvars:
      - col: AGESLFC
        plot_type: scatter
        unit: days
        plot_attr:
          label: "Days Since Last Good LFC frame\n(depends on processing order)"
          marker: .
          linewidth: 0.5
    paneldict:
      ylabel: "Days Since Last\nGood LFC frame"
      not_junk: true
      legend_frac_size: 0.20
  - panelvars:
      - col: AGEULFC
        plot_type: scatter
        unit: days
        plot_attr:
          label: "Days Until Next Good LFC frame\n(depends on processing order)"
          marker: .
          linewidth: 0.5
    paneldict:
      ylabel: "Days Until Next\nGood LFC frame"
      not_junk: true
      legend_frac_size: 0.20
  - panelvars:
      - col: AGESETA
        plot_type: scatter
        unit: days
        plot_attr:
          label: "Days Since Last Good Etalon frame\n(depends on processing order)"
          marker: .
          linewidth: 0.5
    paneldict:
      ylabel: "Days Since Last\nGood Etalon frame"
      not_junk: true
      legend_frac_size: 0.20
  - panelvars:
      - col: AGEUETA
        plot_type: scatter
        unit: days
        plot_attr:
          label: "Days Until Next Good Etalon frame\n(depends on processing order)"
          marker: .
          linewidth: 0.5
    paneldict:
      ylabel: "Days Until Next\nGood Etalon frame"
      title: Last Good LFC and Etalon Calibrations
      not_junk: true
      legend_frac_size: 0.20
 