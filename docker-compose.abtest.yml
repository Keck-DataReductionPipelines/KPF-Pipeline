services:
  abtest-postgres:
    build:
      context: ./docker/abtest-postgres
    image: kpf-abtest-postgres:latest
    container_name: kpf-abtest-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ABTEST_DB_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${ABTEST_DB_SUPERPASS:-postgres}
      ABTEST_DB_USER: ${ABTEST_DB_USER:-kpfopsuser}
      ABTEST_DB_PASS: ${ABTEST_DB_PASS:-kpfopspass}
      ABTEST_TSDB_USER: ${ABTEST_TSDB_USER:-timeseriesopsuser}
      ABTEST_TSDB_PASS: ${ABTEST_TSDB_PASS:-timeseriesopspass}
    volumes:
      - ./abtest-pgdata:/var/lib/postgresql/data
      - ./docker/abtest-postgres/initdb:/docker-entrypoint-initdb.d
    networks:
      - abtest-net
    ports:
      - "${ABTEST_PG_HOST_PORT:-6125}:5432"

  drp:
    image: kpf-drp:latest
    container_name: kpf-drp-shell
    stdin_open: true
    tty: true
    working_dir: /code/KPF-Pipeline
    entrypoint: ["bash"]
    depends_on:
      - abtest-postgres
    network_mode: host
    environment:
      DBPORT: ${ABTEST_DB_PORT:-${DBPORT:-6125}}
      DBNAME: ${DBNAME:-kpfopsdb}
      DBUSER: ${ABTEST_DB_USER:-${DBUSER:-kpfopsuser}}
      DBPASS: ${ABTEST_DB_PASS:-${DBPASS:-kpfopspass}}
      DBSERVER: ${ABTEST_DB_SERVER:-${DBSERVER:-127.0.0.1}}
      TSDBPORT: ${ABTEST_TSDB_PORT:-${TSDBPORT:-6125}}
      TSDBNAME: ${TSDBNAME:-timeseriesopsdb}
      TSDBUSER: ${ABTEST_TSDB_USER:-${TSDBUSER:-timeseriesopsuser}}
      TSDBPASS: ${ABTEST_TSDB_PASS:-${TSDBPASS:-timeseriesopspass}}
      TSDBSERVER: ${ABTEST_TSDB_SERVER:-${TSDBSERVER:-127.0.0.1}}
      KPFPIPE_PORT: ${KPFPIPE_PORT:-}
    volumes:
      - .:/code/KPF-Pipeline
      - ${KPFPIPE_TEST_DATA:-/data/KPF-Pipeline-TestData}:/testdata
      - ${KPFPIPE_DATA:-/data/kpf}:/data
      - ${KPFPIPE_DATA:-/data/kpf}/masters:/masters

networks:
  abtest-net:
    driver: bridge

