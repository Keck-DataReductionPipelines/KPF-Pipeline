description: Good Orders - Etalon
plot_type: time_series_multipanel
panel_arr:
  - panelvars:
      - col: ETALGC0
        col_max: ETALGC1
        col_min: ETALGC0
        plot_type: vlines
        plot_attr:
          label: "Max Good CAL Order"
          linewidth: 0.5
          color: limegreen
        vline_pt_color: forestgreen
    paneldict:
      ymin: -2.5
      ymax: 35.5
      ylabel: "Max/Min Good Orders\n(Etalon Green - CAL)"
      not_junk: true
      qc_not_fail: 'GOODREAD,TIMCHKL0,ETASTEMP'
      nolegend: true
      only_object: 
        - autocal-etalon-all-night
        - autocal-etalon-all-eve
        - autocal-etalon-all-morn
        - manualcal-etalon-all
        - Etalon_cal
        - etalon-sequence
      axhspan:
        1:
          ymax: 0.0
          ymin: -2.5
          color: red
          alpha: 0.1
        2:
          ymin: 0.0
          ymax: 34.0
          color: green
          alpha: 0.2

