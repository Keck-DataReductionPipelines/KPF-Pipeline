description: LFC Diagnostics
plot_type: time_series_multipanel
panel_arr:
  - panelvars:
      - col: LFCCEOFR
        plot_type: scatter
        unit: Hz
        plot_attr:
          label: "CEO Filtered Setpoint Freq (LFCCEOFR)"
          marker: .
          linewidth: 0.5
    paneldict:
      ylabel: "LFC CEO Filtered\nSetpoint Freq"
      not_junk: true
      qc_not_fail: 'GOODREAD, FLXSTATS, DATAPRL0, KWRDPRL0, TIMCHKL0'
      legend_frac_size: 0.25
      only_object: 
        - autocal-lfc-all-morn
        - autocal-lfc-all-eve
        - autocal-lfc-all-night
        - cal-LFC
        - cal-LFC-morn
        - cal-LFC-eve
        - LFC_all
        - lfc_all
        - LFC

  - panelvars:
      - col: LFCCWMDN
        plot_type: scatter
        plot_attr:
          label: "CW Node Number (LFCCWMDN)"
          marker: .
          linewidth: 0.5
