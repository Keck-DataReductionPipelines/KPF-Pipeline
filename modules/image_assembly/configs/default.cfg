[LOGGER]
log = True
log_path = logs/image_assembly.log
log_level = info
log_verbose = True

[PARAM]
channel_orientation_ref_path_red = /code/KPF-Pipeline/static/kpfsim_ccd_orient_red.txt
channel_orientation_ref_path_green = /code/KPF-Pipeline/static/kpfsim_ccd_orient_green.txt
prescan_region = [0,4]
overscan_method = rowmedian
overscan_buffer = [5,5] # number of edge columns in serial overscan to skip
overscan_sigma = 2.1
overscan_order = 1