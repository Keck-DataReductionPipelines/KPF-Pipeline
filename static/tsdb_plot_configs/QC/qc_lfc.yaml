description: QC - LFC Metrics
plot_type: time_series_multipanel
panel_arr:
  - panelvars:
      - col: LFCSAT
        plot_type: state
        plot_attr:
          label: LFC Not Saturated
          marker: .
    paneldict:
      ylabel: "LFC Not Saturated\n(LFCSAT)"
      qc_not_fail: 'GOODREAD'
      legend_frac_size: 0.15
      only_object: 
        - autocal-lfc-all-morn
        - autocal-lfc-all-eve
        - autocal-lfc-all-night
        - cal-LFC
        - cal-LFC-morn
        - cal-LFC-eve
        - LFC_all
        - lfc_all
        - LFC

  - panelvars:
      - col: LFC2DFOK
        plot_type: state
        plot_attr:
          label: "LFC Flux Meets Threshold\nof 4000 Counts"
          marker: .
    paneldict:
      ylabel: "LFC Flux Meets Threshold\nof 4000 Counts\n(LFC2DFOK)"
      qc_not_fail: 'GOODREAD'
      legend_frac_size: 0.15
      only_object: 
        - autocal-lfc-all-morn
        - autocal-lfc-all-eve
        - autocal-lfc-all-night
        - cal-LFC
        - cal-LFC-morn
        - cal-LFC-eve
        - LFC_all
        - lfc_all
        - LFC

  - panelvars:
      - col: LFCLINES
        plot_type: state
        plot_attr:
          label: "Number and dist of\nLFC lines sufficient\n(SCI orders 2-34, 1-31)"
          marker: .
    paneldict:
      ylabel: "Number and dist of\nLFC lines sufficient\n(SCI orders 2-34, 1-31)\n(LFCLINES)"
      qc_not_fail: 'GOODREAD'
      legend_frac_size: 0.15
      only_object: 
        - autocal-lfc-all-morn
        - autocal-lfc-all-eve
        - autocal-lfc-all-night
        - cal-LFC
        - cal-LFC-morn
        - cal-LFC-eve
        - LFC_all
        - lfc_all
        - LFC

  - panelvars:
      - col: LFCLINEP
        plot_type: state
        plot_attr:
          label: "Number and dist of\nLFC lines sufficient\n(SCI orders 15-34, 1-31)"
          marker: .
    paneldict:
      ylabel: "Number and dist of\nLFC lines sufficient\n(SCI orders 15-34, 1-31)\n(LFCLINEP)"
      legend_frac_size: 0.15
      qc_not_fail: 'GOODREAD'
      title: QC - LFC Metrics
      only_object: 
        - autocal-lfc-all-morn
        - autocal-lfc-all-eve
        - autocal-lfc-all-night
        - cal-LFC
        - cal-LFC-morn
        - cal-LFC-eve
        - LFC_all
        - lfc_all
        - LFC
