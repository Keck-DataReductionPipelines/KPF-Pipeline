description: QC - Etalon Metrics
plot_type: time_series_multipanel
panel_arr:
  - panelvars:
      - col: ETALINES
        plot_type: state
        plot_attr:
          label: "Number and dist of\nEtalon lines ok"
          marker: .
    paneldict:
      ylabel: "Number and dist of\nEtalon lines ok\n(ETALINES)"
      legend_frac_size: 0.30
      qc_not_fail: 'GOODREAD'
      only_object: 
        - autocal-etalon-all-night
        - autocal-etalon-all-eve
        - autocal-etalon-all-morn
        - manualcal-etalon-all
        - Etalon_cal
        - etalon-sequence

  - panelvars:
      - col: ETASTEMP
        plot_type: state
        plot_attr:
          label: "Etalon at set temp"
          marker: .
    paneldict:
      ylabel: "Etalon at set temp\n(ETASTEMP)"
      legend_frac_size: 0.30
      qc_not_fail: 'GOODREAD'
      only_object: 
        - autocal-etalon-all-night
        - autocal-etalon-all-eve
        - autocal-etalon-all-morn
        - manualcal-etalon-all
        - Etalon_cal
        - etalon-sequence
