description: 2D/L1/L2 Files Missing
plot_type: time_series_multipanel
panel_arr:
  - panelvars:
      - col: D2_missing
        plot_type: state
        plot_attr:
          label: File missing - 2D
          marker: .
    paneldict:
      ylabel: "File missing - 2D\nPass = missing"
      not_junk: true
      qc_not_fail: 'GOODREAD, FLXSTATS, DATAPRL0, KWRDPRL0, TIMCHKL0'
      legend_frac_size: 0.15

  - panelvars:
      - col: L1_missing
        plot_type: state
        plot_attr:
          label: File missing - L1
          marker: .
    paneldict:
      ylabel: "File missing - L1\nPass = missing"
      not_junk: true
      qc_not_fail: 'GOODREAD, FLXSTATS, DATAPRL0, KWRDPRL0, TIMCHKL0'
      legend_frac_size: 0.15

  - panelvars:
      - col: L2_missing
        plot_type: state
        plot_attr:
          label: File missing - L2
          marker: .
    paneldict:
      ylabel: "File missing - L2\nPass = missing"
      not_junk: true
      qc_not_fail: 'GOODREAD, FLXSTATS, DATAPRL0, KWRDPRL0, TIMCHKL0'
      legend_frac_size: 0.15
      title: 2D/L1/L2 Files Missing
