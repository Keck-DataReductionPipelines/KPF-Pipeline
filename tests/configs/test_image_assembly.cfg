# This is an example config showing use of the Image Assembly module

## Pipeline logger configurations
[LOGGER]
start_log = True
log_path = pipeline.log
log_level = info
log_verbose = True
log_directory = /data/logs/

[ARGUMENT]
data_type = KPF

[MODULE_CONFIGS]
image_assembly = modules/image_assembly/configs/default.cfg
calibration_lookup = modules/calibration_lookup/configs/default.cfg
