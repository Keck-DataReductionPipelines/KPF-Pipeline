description: Etalon Temperatures
plot_type: time_series_multipanel
panel_arr:
  - panelvars:
      - col: ETAV1C1T
        plot_type: plot
        unit: C
        plot_attr:
          label: "Housing Temp (ETAV1C1T)"
          marker: .
          linewidth: 0.5
          color: red
      - col: ETAV1C2T
        plot_type: plot
        unit: C
        plot_attr:
          label: "Inner Side Shield Temp\n(ETAV1C2T)"
          marker: .
          linewidth: 0.5
          color: blue
      - col: ETAV1C3T
        plot_type: plot
        unit: C
        plot_attr:
          label: "Inner Bottom Lid Temp\n(ETAV1C3T)"
          marker: .
          linewidth: 0.5
          color: green
      - col: ETAV1C4T
        plot_type: plot
        unit: C
        plot_attr:
          label: "Outer Etalon Chamber Temp\n(ETAV1C4T)"
          marker: .
          linewidth: 0.5
          color: orange
      - col: ETAV2C3T
        plot_type: plot
        unit: C
        plot_attr:
          label: "Inner Top Lid Temp\n(ETAV2C3T)"
          marker: .
          linewidth: 0.5
          color: purple
    paneldict:
      title: Etalon Temperatures
      ylabel: Temperature (C)
      not_junk: true
      qc_not_fail: 'TELEPRL0'
      legend_frac_size: 0.25

  - panelvars:
      - col: ETAV1C1T
        col_multiply: 1000
        plot_type: plot
        unit: mK
        plot_attr:
          label: Housing Temp
          marker: .
          linewidth: 0.5
          color: red
    paneldict:
      title: Etalon Temperatures
      ylabel: "$\\Delta$Temp (mK)"
      not_junk: true
      subtractmedian: true
      legend_frac_size: 0.25

  - panelvars:
      - col: ETAV1C2T
        col_multiply: 1000
        plot_type: plot
        unit: mK
        plot_attr:
          label: "Inner Side Shield Temp\n(ETAV1C2T)"
          marker: .
          linewidth: 0.5
          color: blue
    paneldict:
      ylabel: "$\\Delta$Temp (mK)"
      not_junk: true
      qc_not_fail: 'TELEPRL0'
      subtractmedian: true
      legend_frac_size: 0.25

  - panelvars:
      - col: ETAV2C3T
        col_multiply: 1000
        plot_type: plot
        unit: mK
        plot_attr:
          label: "Inner Top Lid Temp\n(ETAV2C3T)"
          marker: .
          linewidth: 0.5
          color: purple
    paneldict:
      ylabel: "$\\Delta$Temp (mK)"
      title: Etalon Temperatures
      not_junk: true
      qc_not_fail: 'TELEPRL0'
      subtractmedian: true
      legend_frac_size: 0.25

  - panelvars:
      - col: ETAV1C4T
        col_multiply: 1000
        plot_type: plot
        unit: mK
        plot_attr:
          label: "Outer Etalon Chamber Temp\n(ETAV1C4T)"
          marker: .
          linewidth: 0.5
          color: orange
    paneldict:
      ylabel: "$\\Delta$Temp (mK)"
      not_junk: true
      qc_not_fail: 'TELEPRL0'
      subtractmedian: true
      legend_frac_size: 0.25

  - panelvars:
      - col: ETAV1C3T
        col_multiply: 1000
        plot_type: plot
        unit: mK
        plot_attr:
          label: "Inner Bottom Lid Temp\n(ETAV1C3T)"
