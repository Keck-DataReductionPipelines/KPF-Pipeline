description: CCD Cross Dispersion Offsets
plot_type: time_series_multipanel
panel_arr:
  - panelvars:
      - col: XDSPDYG1
        col_err: XDSPSYG1
        plot_type: errorbar
        plot_attr:
          label: "Green Cross-dispersion\noffset [pix] - master ref"
          fmt: o 
          linewidth: 0.5
    paneldict:
      ylabel: "Green Cross-dispersion\noffset [pix] - master ref"
      only_object: 
        - autocal-flat-all
      not_junk: true
      qc_not_fail: 'FLATSNR, GOODREAD, FLXSTATS, DATAPRL0, KWRDPRL0, TIMCHKL0'
      legend_frac_size: 0.25
  - panelvars:
      - col: XDSPDYR1
        col_err: XDSPSYR1
        plot_type: errorbar
        plot_attr:
          label: "Red Cross-dispersion\noffset [pix] - master ref"
          fmt: o 
          linewidth: 0.5
    paneldict:
      ylabel: "Red Cross-dispersion\noffset [pix] - master ref"
      only_object: 
        - autocal-flat-all
      not_junk: true
      qc_not_fail: 'FLATSNR, GOODREAD, FLXSTATS, DATAPRL0, KWRDPRL0, TIMCHKL0'
      legend_frac_size: 0.25
  - panelvars:
      - col: XDSPDYG2
        col_err: XDSPSYG2
        plot_type: errorbar
        plot_attr:
          label: "Green Cross-dispersion\noffset [pix] - ref in era"
          fmt: o 
          linewidth: 0.5
    paneldict:
      ylabel: "Green Cross-dispersion\noffset [pix] - ref in era"
      only_object: 
        - autocal-flat-all
      not_junk: true
      qc_not_fail: 'FLATSNR, GOODREAD, FLXSTATS, DATAPRL0, KWRDPRL0, TIMCHKL0'
      legend_frac_size: 0.25
  - panelvars:
      - col: XDSPDYR2
        col_err: XDSPSYR2
        plot_type: errorbar
        plot_attr:
          label: "Red Cross-dispersion\noffset [pix] - ref in era"
          fmt: o 
          linewidth: 0.5
    paneldict:
      ylabel: "Red Cross-dispersion\noffset [pix] - ref in era"
      only_object: 
        - autocal-flat-all
      title: CCD Cross Dispersion Offsets
      not_junk: true
      qc_not_fail: 'FLATSNR, GOODREAD, FLXSTATS, DATAPRL0, KWRDPRL0, TIMCHKL0'
      legend_frac_size: 0.25

  # 1) chambertemppanel1
  - panelvars:
      - col: kpfmet.BENCH_BOTTOM_BETWEEN_CAMERAS
        plot_type: plot
        unit: K
        plot_attr:
          label: "Bench$\\downarrow$ Cams"
          marker: .
          linewidth: 0.5
      - col: kpfmet.BENCH_BOTTOM_COLLIMATOR
        plot_type: plot
        unit: K
        plot_attr:
          label: "Bench$\\downarrow$ Coll."
          marker: .
          linewidth: 0.5
      - col: kpfmet.BENCH_BOTTOM_DCUT
        plot_type: plot
        unit: K
        plot_attr:
          label: "Bench$\\downarrow$ D-Cut"
          marker: .
          linewidth: 0.5
      - col: kpfmet.BENCH_BOTTOM_ECHELLE
        plot_type: plot
        unit: K
        plot_attr:
          label: "Bench$\\downarrow$ Echelle"
          marker: .
          linewidth: 0.5
      - col: kpfmet.BENCH_TOP_BETWEEN_CAMERAS
        plot_type: plot
        unit: K
        plot_attr:
          label: Bench Cams
          marker: .
          linewidth: 0.5
      - col: kpfmet.BENCH_TOP_COLL
        plot_type: plot
        unit: K
        plot_attr:
          label: Bench Coll
          marker: .
          linewidth: 0.5
      - col: kpfmet.BENCH_TOP_DCUT
        plot_type: plot
        unit: K
        plot_attr:
          label: Bench D-Cut
          marker: .
          linewidth: 0.5
      - col: kpfmet.BENCH_TOP_ECHELLE_CAM
        plot_type: plot
        unit: K
        plot_attr:
          label: Bench Ech-Cam
          marker: .
          linewidth: 0.5
    paneldict:
      ylabel: "Bench\n$\\Delta$Temperature (K)"
      not_junk: true
      qc_not_fail: 'FLATSNR, GOODREAD, FLXSTATS, DATAPRL0, KWRDPRL0, TIMCHKL0'
      nolegend: false
      axhspan:
        1:
          ymin: 0.1
          ymax: 10
          color: red
          alpha: 0.1
        2:
          ymin: -10
          ymax: -0.1
          color: red
          alpha: 0.1
        3:
          ymin: 0.01
          ymax: 0.1
          color: orange
          alpha: 0.1
        4:
          ymin: -0.1
          ymax: -0.01
          color: orange
          alpha: 0.1
        5:
          ymin: -0.01
          ymax:  0.01
          color: green
          alpha: 0.1
      subtractmedian: true
      legend_frac_size: 0.3

